<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GLB test</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
<style>
body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 800px; margin: 0 auto; background: #fafaf7; }
h1 { font-size: 1.5rem; }
model-viewer {
  width: 100%;
  height: 500px;
  background: #f5f4ee;
  border: 1px solid #ddd;
  border-radius: 4px;
}
.note { color: #666; font-size: 0.9rem; line-height: 1.5; }
</style>
</head>
<body>

<h1>Mannequin GLB sanity check</h1>

<p class="note">If the figure shows up below in a posed stance and you can drag to rotate, we're good. If it's blank, white, or tiny, tell me what you see.</p>

<model-viewer
  src="test.glb"
  alt="Test mannequin"
  camera-controls
  auto-rotate
  shadow-intensity="1"
  exposure="1"
  camera-orbit="30deg 75deg auto">
</model-viewer>

<p class="note">Drag to rotate. Default camera is auto-orbiting; click to stop.</p>

</body>
</html>
