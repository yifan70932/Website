<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aviation accidents map · yifanova.com/flying</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600&family=Noto+Serif+SC:wght@400;600&family=JetBrains+Mono:wght@400&display=swap">

  <link rel="stylesheet" href="/assets/flying.css">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="">
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <script defer src="/assets/accidents-data.js"></script>

  <style>
    /* Standalone-page layout: full-viewport map with topbar + filter strip + side list */
    html, body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
    }
    .flying-page {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .flying-page .topbar {
      flex: 0 0 auto;
    }
    .flying-page .acc-page-controls {
      flex: 0 0 auto;
      padding: 0.6rem 1rem;
      background: var(--fl-paper);
      border-bottom: 1px solid var(--fl-rule);
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      font-family: var(--fl-font-ui);
      font-size: 0.86rem;
    }
    .flying-page[data-lang="zh"] .acc-page-controls { font-family: var(--fl-font-cn); }
    .flying-page .acc-page-controls .acc-back {
      color: var(--fl-sapphire);
      text-decoration: none;
      font-weight: 500;
    }
    .flying-page .acc-page-controls .acc-back:hover { text-decoration: underline; }
    .flying-page .acc-page-title {
      font-weight: 600;
      color: var(--fl-ink);
    }
    .flying-page .acc-slider-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex: 1 1 280px;
      min-width: 240px;
      color: var(--fl-ink-faint);
      letter-spacing: 0.04em;
      font-size: 0.82rem;
    }
    .flying-page .acc-slider-row input[type="range"] {
      flex: 1;
      min-width: 80px;
      accent-color: var(--fl-sapphire);
    }
    .flying-page .acc-year-display {
      font-family: var(--fl-font-mono);
      font-size: 0.85rem;
      color: var(--fl-ink);
      font-weight: 600;
      min-width: 5.5rem;
    }
    .flying-page .acc-page-body {
      flex: 1 1 auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      min-height: 0;
    }
    .flying-page #accidents-map {
      width: 100%;
      height: 100%;
      background: #f0f0f0;
      border: none;
      border-radius: 0;
    }
    .flying-page .acc-side {
      border-left: 1px solid var(--fl-rule);
      background: var(--fl-paper);
      overflow-y: auto;
    }
    .flying-page .acc-side .accidents-list {
      list-style: none;
      margin: 0;
      padding: 0;
      font-size: 0.84rem;
    }
    /* Mobile: side panel collapses below */
    @media (max-width: 800px) {
      .flying-page .acc-page-body {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 14rem;
      }
      .flying-page .acc-side {
        border-left: none;
        border-top: 1px solid var(--fl-rule);
        max-height: 14rem;
      }
    }
  </style>
</head>

<body class="flying-page" data-lang="en">

<!-- ─── Topbar ─────────────────────────────────────────────────── -->
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <span class="brand-mark">yifanova.com</span>
      <span>·</span>
      <a href="/">home</a>
      <span>·</span>
      <a href="/flying/">/flying</a>
      <span>·</span>
      <span data-lang-content="en">accidents map</span>
      <span data-lang-content="zh">事故地图</span>
    </div>
    <div class="lang-toggle" role="tablist" aria-label="Language">
      <button type="button" data-lang-set="en" class="active">EN</button>
      <button type="button" data-lang-set="zh">中文</button>
    </div>
  </div>
</header>

<!-- ─── Filter strip ──────────────────────────────────────────── -->
<div class="acc-page-controls">
  <a class="acc-back" href="/flying/#sec-defense">
    <span data-lang-content="en">← Back to §6 of Romance, Not Conquest</span>
    <span data-lang-content="zh">← 返回《起舞而非征服》§6</span>
  </a>
  <div class="acc-slider-row">
    <span data-lang-content="en">Time range:</span>
    <span data-lang-content="zh">时间范围：</span>
    <input type="range" id="accidents-year-from" min="1970" max="2026" value="1970" step="1">
    <input type="range" id="accidents-year-to" min="1970" max="2026" value="2026" step="1">
    <span class="acc-year-display" id="accidents-year-display">1970–2026</span>
  </div>
</div>

<!-- ─── Body: map + side list ─────────────────────────────────── -->
<div class="acc-page-body">
  <div class="accidents-map" id="accidents-map"></div>
  <aside class="acc-side accidents-list-wrap">
    <ol class="accidents-list" id="accidents-list"></ol>
  </aside>
</div>

<!-- Hidden widget container so the shared init script can find expected ids -->
<div id="accidents-widget" style="display:none"></div>

<!-- ─── Lang toggle ──────────────────────────────────────────── -->
<script>
(function () {
  const buttons = document.querySelectorAll('.lang-toggle button[data-lang-set]');
  function setLang(lang) {
    document.body.setAttribute('data-lang', lang);
    buttons.forEach(b => b.classList.toggle('active', b.dataset.langSet === lang));
    document.querySelectorAll('[data-lang-content]').forEach(el => {
      el.style.display = el.dataset.langContent === lang ? '' : 'none';
    });
    document.dispatchEvent(new CustomEvent('flying:langchange', { detail: { lang } }));
  }
  buttons.forEach(b => b.addEventListener('click', () => setLang(b.dataset.langSet)));
  setLang('en');
})();
</script>

<script defer src="/assets/accidents-map.js"></script>

</body>
</html>
