    const zoomControls = document.createElement('div');

    zoomControls.innerHTML = `
      <button class="fn-zoom-btn" data-action="in" title="放大 (+)">＋</button>
      <button class="fn-zoom-btn" data-action="out" title="缩小 (−)">−</button>

    `;
    stage.appendChild(zoomControls);

    const zoomInfo = document.createElement('div');
    zoomInfo.className = 'fn-zoom-info';
    zoomInfo.textContent = '100%';

    zoomHint.className = 'fn-zoom-hint';
    zoomHint.textContent = '滚轮缩放 · 拖动平移';
    stage.appendChild(zoomHint);

    // ─── 缩放 / 平移状态 ─────────────────────────────
    const VIEW = { w: 1280, h: 620 };
    const ZOOM_MIN = 0.5, ZOOM_MAX = 2.5, ZOOM_STEP = 1.2;
    let scale = 1, panX = 0, panY = 0;

    function applyTransform() {
      canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
      zoomInfo.textContent = Math.round(scale * 100) + '%';
    }

    // 计算初始视图：让画布在 stage 中居中并缩放到适配宽度
    function fitToView() {
      const rect = stage.getBoundingClientRect();
      const fitScale = Math.min(rect.width / VIEW.w, rect.height / VIEW.h, 1);
      scale = fitScale;
      panX = (rect.width - VIEW.w * scale) / 2;
      panY = (rect.height - VIEW.h * scale) / 2;
      applyTransform();
    }

    // 缩放：以指定屏幕坐标 (sx, sy) 为中心
    function zoomAt(sx, sy, factor) {
      const newScale = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, scale * factor));
      if (newScale === scale) return;
      const rect = stage.getBoundingClientRect();
      const cx = sx - rect.left;  // stage 内坐标
      const cy = sy - rect.top;
      // 缩放后保持 (cx, cy) 处指向同一画布点：
      // 画布坐标 P = (cx - panX) / scale。新 panX 满足 P = (cx - newPanX) / newScale
      panX = cx - (cx - panX) * (newScale / scale);
      panY = cy - (cy - panY) * (newScale / scale);
      scale = newScale;
      applyTransform();
    }

    // 滚轮缩放
    stage.addEventListener('wheel', (e) => {
      e.preventDefault();
      const factor = e.deltaY < 0 ? ZOOM_STEP : 1 / ZOOM_STEP;
      zoomAt(e.clientX, e.clientY, factor);
    }, { passive: false });

    // 按钮控制
    zoomControls.addEventListener('click', (e) => {
      const btn = e.target.closest('.fn-zoom-btn');
      if (!btn) return;
      const rect = stage.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      if (btn.dataset.action === 'in') zoomAt(cx, cy, ZOOM_STEP);
      else if (btn.dataset.action === 'out') zoomAt(cx, cy, 1 / ZOOM_STEP);
      else if (btn.dataset.action === 'reset') fitToView();
    });

    // 拖动平移：区分点击与拖动（移动 > 5px 视为拖动）
    let dragState = null;
    stage.addEventListener('mousedown', (e) => {
      // 不要拦截缩放按钮的点击
      if (e.target.closest('.fn-zoom-btn')) return;
      dragState = {
        startX: e.clientX, startY: e.clientY,
        startPanX: panX, startPanY: panY,
        moved: false,
      };
    });
    document.addEventListener('mousemove', (e) => {
      if (!dragState) return;
      const dx = e.clientX - dragState.startX;
      const dy = e.clientY - dragState.startY;
      if (!dragState.moved && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) {
        dragState.moved = true;
        stage.classList.add('grabbing');
      }
      if (dragState.moved) {
        panX = dragState.startPanX + dx;
        panY = dragState.startPanY + dy;
        applyTransform();
      }
    });
    document.addEventListener('mouseup', (e) => {
      if (!dragState) return;
      stage.classList.remove('grabbing');
      // 如果是拖动而非点击，吃掉随后产生的 click 事件
      if (dragState.moved) {
        // 防止节点点击在拖动结束后触发
        const consume = (ev) => { ev.stopPropagation(); ev.preventDefault(); };
        canvas.addEventListener('click', consume, { capture: true, once: true });
      }
      dragState = null;
    });

    // 键盘快捷键：+/-/0
    stage.tabIndex = 0;
    stage.addEventListener('keydown', (e) => {
      const rect = stage.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      if (e.key === '+' || e.key === '=') { zoomAt(cx, cy, ZOOM_STEP); e.preventDefault(); }
      else if (e.key === '-' || e.key === '_') { zoomAt(cx, cy, 1 / ZOOM_STEP); e.preventDefault(); }
      else if (e.key === '0') { fitToView(); e.preventDefault(); }
    });

    // 触摸双指缩放（基础支持）
    let pinchState = null;
    stage.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        pinchState = {
          dist: Math.hypot(dx, dy),
          cx: (e.touches[0].clientX + e.touches[1].clientX) / 2,
          cy: (e.touches[0].clientY + e.touches[1].clientY) / 2,
          startScale: scale,
        };
      } else if (e.touches.length === 1) {
        dragState = {
          startX: e.touches[0].clientX, startY: e.touches[0].clientY,
          startPanX: panX, startPanY: panY, moved: false,
        };
      }
    }, { passive: true });
    stage.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2 && pinchState) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.hypot(dx, dy);
        const factor = (dist / pinchState.dist);
        const newScale = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, pinchState.startScale * factor));
        const rect = stage.getBoundingClientRect();
        const cx = pinchState.cx - rect.left, cy = pinchState.cy - rect.top;
        panX = cx - (cx - panX) * (newScale / scale);
        panY = cy - (cy - panY) * (newScale / scale);
        scale = newScale;
        applyTransform();
        e.preventDefault();
      } else if (e.touches.length === 1 && dragState) {
        const tdx = e.touches[0].clientX - dragState.startX;
        const tdy = e.touches[0].clientY - dragState.startY;
        if (!dragState.moved && (Math.abs(tdx) > 5 || Math.abs(tdy) > 5)) dragState.moved = true;
        if (dragState.moved) {
          panX = dragState.startPanX + tdx;
          panY = dragState.startPanY + tdy;
          applyTransform();
        }
      }
    }, { passive: false });
    stage.addEventListener('touchend', () => {
      pinchState = null;
      dragState = null;
    });

    // 1. 家族 box（最底层 z=0）
    houses.forEach(h => {
      const box = document.createElement('div');
      box.className = 'fn-house';
      box.style.left = h.x + 'px';
      box.style.top = h.y + 'px';
      box.style.width = h.w + 'px';
      box.style.height = h.h + 'px';
      canvas.appendChild(box);

      // 标签放在 box 上方，单独的 div
      const lbl = document.createElement('div');
      lbl.className = 'fn-house-label';
      lbl.style.left = (h.x + h.w / 2) + 'px';
      lbl.style.top = (h.y - 3) + 'px';
      lbl.style.transform = 'translate(-50%, -50%)';
      lbl.textContent = h.label;
      canvas.appendChild(lbl);
    });

    // 2. SVG 边层（z=1）
    const SVG_NS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(SVG_NS, 'svg');
    svg.setAttribute('class', 'fn-edges-layer');
    svg.setAttribute('viewBox', '0 0 1280 620');
    svg.setAttribute('preserveAspectRatio', 'none');
    canvas.appendChild(svg);

    // 节点半径用于线段端点偏移
    function getR(n) { return n.type === 'ya' ? 23 : 28; }

    const edgeElements = {};
    edges.forEach((e, idx) => {
      const a = nodes[e.from], b = nodes[e.to];
      if (!a || !b) return;

      // 计算从节点边缘开始的端点（避免线穿过圆圈）
      const dx = b.x - a.x, dy = b.y - a.y;
      const len = Math.hypot(dx, dy);
      if (len === 0) return;
      const ra = getR(a), rb = getR(b);
      const ux = dx / len, uy = dy / len;
      const x1 = a.x + ux * ra;
      const y1 = a.y + uy * ra;
      const x2 = b.x - ux * rb;
      const y2 = b.y - uy * rb;

      const cls = e.type === 'parent' ? 'parent'
                : e.type === 'marriage' ? 'marriage'
                : 'dashed';

      if (e.type === 'marriage') {
        const ox = -uy * 2, oy = ux * 2;
        const l1 = document.createElementNS(SVG_NS, 'line');
        l1.setAttribute('x1', x1 + ox); l1.setAttribute('y1', y1 + oy);
        l1.setAttribute('x2', x2 + ox); l1.setAttribute('y2', y2 + oy);
        const l2 = document.createElementNS(SVG_NS, 'line');
        l2.setAttribute('x1', x1 - ox); l2.setAttribute('y1', y1 - oy);
        l2.setAttribute('x2', x2 - ox); l2.setAttribute('y2', y2 - oy);
        svg.appendChild(l1); svg.appendChild(l2);
        edgeElements[idx] = [l1, l2];
      } else {
        const line = document.createElementNS(SVG_NS, 'line');
        line.setAttribute('x1', x1); line.setAttribute('y1', y1);
        line.setAttribute('x2', x2); line.setAttribute('y2', y2);
        if (cls === 'dashed') line.classList.add('dashed');
        svg.appendChild(line);
        edgeElements[idx] = [line];
      }
    });

    // 为关系标签预留一个 group 在 svg 内
    let labelGroup = null;
    function clearLabels() {
      if (labelGroup) {
        labelGroup.remove();
        labelGroup = null;
      }
    }

    // 3. 节点 div（z=3）
    const nodeElements = {};
    Object.entries(nodes).forEach(([id, n]) => {
      const div = document.createElement('div');
      div.className = 'fn-node';
      if (n.type === 'ya') div.classList.add('ya');
      if (n.type === 'outsider') div.classList.add('outsider');
      if (n.dead === 'pre') div.classList.add('dead-pre');
      if (n.dead === 'within') div.classList.add('dead-within');
      if (n.name.length >= 3) div.classList.add('long');
      div.style.left = n.x + 'px';
      div.style.top = n.y + 'px';
      div.textContent = n.name;
      div.addEventListener('click', () => selectNode(id));
      canvas.appendChild(div);
      nodeElements[id] = div;
    });

    // ─── 选择 / 详情 ──────────────────────────────────
    let selected = null;

    function selectNode(id) {
      // 清除旧高亮
      Object.values(nodeElements).forEach(d => {
        d.classList.remove('selected', 'dim');
      });
      svg.querySelectorAll('line').forEach(l => l.classList.remove('highlight'));
      clearLabels();

      if (selected === id) {
        selected = null;
        renderHint();
        return;
      }

      selected = id;
      nodeElements[id].classList.add('selected');

      labelGroup = document.createElementNS(SVG_NS, 'g');

      const related = new Set([id]);
      edges.forEach((e, idx) => {
        if (e.from !== id && e.to !== id) return;
        const lines = edgeElements[idx];
        if (lines) lines.forEach(l => l.classList.add('highlight'));
        related.add(e.from); related.add(e.to);

        const labelText = (e.from === id) ? e.toRel : e.fromRel;
        if (!labelText) return;

        // 标签位置：边的端点之间，偏向对方端
        const a = nodes[e.from], b = nodes[e.to];
        const dx = b.x - a.x, dy = b.y - a.y;
        const len = Math.hypot(dx, dy);
        if (len === 0) return;
        const ux = dx / len, uy = dy / len;
        const ra = getR(a), rb = getR(b);
        const x1 = a.x + ux * ra, y1 = a.y + uy * ra;
        const x2 = b.x - ux * rb, y2 = b.y - uy * rb;
        const isFromSelected = (e.from === id);
        const t = isFromSelected ? 0.62 : 0.38;
        const mx = x1 + (x2 - x1) * t;
        const my = y1 + (y2 - y1) * t;

        const halo = document.createElementNS(SVG_NS, 'text');
        halo.setAttribute('x', mx); halo.setAttribute('y', my);
        halo.setAttribute('class', 'halo');
        halo.textContent = labelText;
        const txt = document.createElementNS(SVG_NS, 'text');
        txt.setAttribute('x', mx); txt.setAttribute('y', my);
        txt.textContent = labelText;
        labelGroup.appendChild(halo);
        labelGroup.appendChild(txt);
      });

      svg.appendChild(labelGroup);

      Object.entries(nodeElements).forEach(([nid, d]) => {
        if (!related.has(nid)) d.classList.add('dim');
      });

      renderDetail(id);
    }

    function renderHint() {
      detail.innerHTML = '<p class="fn-hint">点击任一人物节点查看详情</p>';
    }

    function renderDetail(id) {
      const n = nodes[id];
      let html = `<h4>${n.name}</h4>`;
      const houseName = {
        rong: '荣国府', ning: '宁国府',
        shi: '史家', wang: '王家', xue: '薛家', lin: '林家',
        misc: '边缘人物', frame: '叙事框架'
      }[n.house] || '';
      const tags = [];
      if (n.dead === 'pre') tags.push('开篇前已逝');
      if (n.dead === 'within') tags.push('前八十回中亡');
      if (n.type === 'ya') tags.push('丫鬟');
      if (n.type === 'outsider') tags.push('外来');
      const tagStr = tags.length ? ` · ${tags.join(' · ')}` : '';
      html += `<div class="fn-meta">${houseName}${tagStr}</div>`;

      if (n.note) html += `<p class="fn-note">${n.note}</p>`;
      if (n.relations) html += `<div class="fn-relations"><strong>关系</strong>：${n.relations}</div>`;

      // 谶语区：分类展示
      const o = n.omens;
      if (o) {
        html += `<div class="fn-omens"><div class="fn-omens-head">命运谶语</div>`;
        if (o.panci) {
          html += `<div class="fn-omen-block"><span class="fn-omen-label">判词</span><div class="fn-omen-body">${o.panci}</div></div>`;
        }
        if (o.qu) {
          html += `<div class="fn-omen-block"><span class="fn-omen-label">红楼梦曲</span><div class="fn-omen-body">${o.qu}</div></div>`;
        }
        if (o.flower) {
          html += `<div class="fn-omen-block"><span class="fn-omen-label">花签</span><div class="fn-omen-body">${o.flower}</div></div>`;
        }
        if (o.riddle) {
          html += `<div class="fn-omen-block"><span class="fn-omen-label">灯谜</span><div class="fn-omen-body">${o.riddle}</div></div>`;
        }
        if (o.poem) {
          html += `<div class="fn-omen-block"><span class="fn-omen-label">诗作 / 其他</span><div class="fn-omen-body">${o.poem}</div></div>`;
        }
        html += `</div>`;
      } else if (n.panci) {
        // 兼容：有 panci 但无 omens 的节点
        html += `<div class="fn-panci">${n.panci}</div>`;
      }

      detail.innerHTML = html;
    }

    renderHint();

    // 初始化视图：让画布适配 stage 宽度并居中
    fitToView();
    // 窗口尺寸变化时重新适配
    window.addEventListener('resize', () => {
      // 简单做法：保留缩放比例，但重新居中如果当前是 100% 适配视图
      // 进阶可记录用户是否手动缩放过；这里保持现状只重定位，避免丢失用户当前焦点
    });
  })();
</script>

</body>
</html>
